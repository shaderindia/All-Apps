<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Parametric Modeler Pro - Perfect Edge Modifiers</title>
    <style>
        :root {
            --bg: #121212;
            --panel-bg: #1e1e1e;
            --text: #f0f0f0;
            --text-muted: #aaa;
            --border: #333;
            --primary: #0a84ff;
            --primary-hover: #0066cc;
            --success: #30d158;
            --success-hover: #24a143;
            --danger: #ff453a;
            --danger-hover: #cc2922;
            --input-bg: #2c2c2e;
            --shadow: rgba(0,0,0,0.5);
        }

        [data-theme="light"] {
            --bg: #e5e5ea;
            --panel-bg: #ffffff;
            --text: #1c1c1e;
            --text-muted: #666;
            --border: #d1d1d6;
            --primary: #007aff;
            --primary-hover: #005bb5;
            --success: #34c759;
            --success-hover: #24a143;
            --danger: #ff3b30;
            --danger-hover: #cc2922;
            --input-bg: #f2f2f7;
            --shadow: rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; touch-action: manipulation; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
        }

        #app { display: flex; width: 100%; height: 100%; flex-direction: row; }
        
        #viewport { flex: 1; position: relative; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; outline: none; }
        
        #ui-panel {
            width: 360px; min-width: 360px; background: var(--panel-bg); height: 100%;
            overflow-y: auto; border-right: 1px solid var(--border); display: flex; flex-direction: column;
            box-shadow: 2px 0 15px var(--shadow); z-index: 10; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header {
            padding: 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-bg); position: sticky; top: 0; z-index: 11;
        }
        .header h2 { margin: 0; font-size: 1.1rem; font-weight: 600; }
        
        .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
        .panel-section h3 { margin: 0 0 12px 0; font-size: 0.95rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .form-group label { font-size: 0.85rem; font-weight: 500; width: 45%; }
        .form-group input[type="number"], .form-group select {
            width: 50%; padding: 8px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 0.85rem; background: var(--input-bg); color: var(--text); outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
        
        .edge-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
            width: 100%; margin-top: 8px; padding: 10px; background: var(--input-bg);
            border-radius: 6px; border: 1px solid var(--border);
        }
        .edge-grid-header { grid-column: span 2; font-size: 0.75rem; font-weight: bold; color: var(--primary); margin-top: 6px; border-bottom: 1px solid var(--border); padding-bottom: 2px;}
        .edge-grid-header:first-child { margin-top: 0; }
        .edge-grid select { width: 100%; font-size: 0.75rem; padding: 4px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel-bg); color: var(--text);}

        .btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        button {
            flex: 1; min-width: 45%; padding: 10px; font-size: 0.85rem; font-weight: 600;
            border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: var(--success-hover); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-secondary { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        
        .icon-btn { padding: 6px; min-width: auto; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
        .icon-btn:hover { background: var(--input-bg); }

        .hidden { display: none !important; }

        #dim-tooltip {
            position: absolute; background: rgba(20, 20, 20, 0.9); padding: 10px 14px;
            border-radius: 8px; font-size: 13px; font-family: 'SF Mono', Consolas, Menlo, monospace;
            pointer-events: none; z-index: 100; border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transform: translate(20px, 20px); color: #fff;
        }
        .dim-row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 4px; }
        .dim-row:last-child { margin-bottom: 0; }
        .dim-val { text-align: right; min-width: 60px; }
        .dim-x { color: #ff5555; font-weight: bold; }
        .dim-y { color: #55ff55; font-weight: bold; }
        .dim-z { color: #5555ff; font-weight: bold; }
        
        #mobile-toggle, #mobile-overlay { display: none; }
        
        @media (max-width: 768px) {
            #app { flex-direction: column; }
            #ui-panel {
                position: absolute; bottom: 0; left: 0; width: 100%; height: 65vh;
                border-right: none; border-top: 1px solid var(--border); border-radius: 16px 16px 0 0;
                transform: translateY(100%); padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
            #ui-panel.open { transform: translateY(0); }
            
            #mobile-toggle {
                display: flex; position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
                z-index: 20; padding: 12px 24px; border-radius: 30px; box-shadow: 0 4px 12px var(--shadow);
                background: var(--primary); color: #fff; font-weight: 600; font-size: 1rem; border: none;
            }
            #mobile-toggle.hidden-btn { display: none !important; }
            
            #mobile-overlay {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.4); z-index: 9; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            }
            #mobile-overlay.active { display: block; opacity: 1; pointer-events: auto; }
            .header { padding-top: 20px; border-radius: 16px 16px 0 0; }
            .header::before { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 40px; height: 4px; background: var(--border); border-radius: 2px; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
            "three-csg-ts": "https://esm.sh/three-csg-ts@3.2.0"
        }
    }
    </script>
</head>
<body>

    <div id="app">
        <div id="mobile-overlay"></div>
        
        <div id="ui-panel">
            <div class="header">
                <h2>Modeler Pro (mm)</h2>
                <div>
                    <button class="icon-btn" id="btn-theme" title="Toggle Theme">🌓</button>
                    <button class="icon-btn" id="btn-close-mobile" style="display: none;">✕</button>
                </div>
            </div>
            
            <div class="panel-section">
                <h3>Global & File</h3>
                <div class="btn-group">
                    <button class="btn-secondary" id="btn-reset-cam">Reset Cam</button>
                    <button class="btn-secondary" id="btn-save">Save JSON</button>
                    <button class="btn-secondary" onclick="document.getElementById('file-input').click()">Load JSON</button>
                    <input type="file" id="file-input" accept=".json" class="hidden">
                    <button class="btn-success" id="btn-export-stl" style="flex-basis: 100%;">Export STL (mm)</button>
                </div>
                <div class="form-group" style="margin-top: 12px;">
                    <label>Wireframe</label><input type="checkbox" id="ui-wireframe">
                </div>
            </div>

            <div class="panel-section" id="panel-base">
                <h3>Base Geometry</h3>
                <div class="form-group">
                    <label>Shape Type</label>
                    <select id="base-shape">
                        <option value="block">Block</option>
                        <option value="cylinder">Cylinder</option>
                    </select>
                </div>
                
                <div id="base-block-controls">
                    <div class="form-group"><label>Width (X) (mm)</label><input type="number" id="base-x" value="100" step="1"></div>
                    <div class="form-group"><label>Depth (Y) (mm)</label><input type="number" id="base-y" value="100" step="1"></div>
                    <div class="form-group"><label>Height (Z) (mm)</label><input type="number" id="base-z" value="50" step="1"></div>
                    
                    <div class="form-group">
                        <label>Edge Size (mm)</label>
                        <input type="number" id="base-edge-val" value="10" step="1" min="0">
                    </div>
                    <div id="base-corners-group" class="edge-grid">
                        <div class="edge-grid-header">Vertical Edges</div>
                        <select id="b-vFL"><option value="none">FL: -</option><option value="fillet">FL: Fillet</option><option value="chamfer">FL: Chamfer</option></select>
                        <select id="b-vFR"><option value="none">FR: -</option><option value="fillet">FR: Fillet</option><option value="chamfer">FR: Chamfer</option></select>
                        <select id="b-vBL"><option value="none">BL: -</option><option value="fillet">BL: Fillet</option><option value="chamfer">BL: Chamfer</option></select>
                        <select id="b-vBR"><option value="none">BR: -</option><option value="fillet">BR: Fillet</option><option value="chamfer">BR: Chamfer</option></select>

                        <div class="edge-grid-header">Top Edges</div>
                        <select id="b-tF"><option value="none">F: -</option><option value="fillet">F: Fillet</option><option value="chamfer">F: Chamfer</option></select>
                        <select id="b-tB"><option value="none">B: -</option><option value="fillet">B: Fillet</option><option value="chamfer">B: Chamfer</option></select>
                        <select id="b-tL"><option value="none">L: -</option><option value="fillet">L: Fillet</option><option value="chamfer">L: Chamfer</option></select>
                        <select id="b-tR"><option value="none">R: -</option><option value="fillet">R: Fillet</option><option value="chamfer">R: Chamfer</option></select>

                        <div class="edge-grid-header">Bottom Edges</div>
                        <select id="b-bF"><option value="none">F: -</option><option value="fillet">F: Fillet</option><option value="chamfer">F: Chamfer</option></select>
                        <select id="b-bB"><option value="none">B: -</option><option value="fillet">B: Fillet</option><option value="chamfer">B: Chamfer</option></select>
                        <select id="b-bL"><option value="none">L: -</option><option value="fillet">L: Fillet</option><option value="chamfer">L: Chamfer</option></select>
                        <select id="b-bR"><option value="none">R: -</option><option value="fillet">R: Fillet</option><option value="chamfer">R: Chamfer</option></select>
                    </div>
                </div>

                <div id="base-cyl-controls" class="hidden">
                    <div class="form-group"><label>Radius (mm)</label><input type="number" id="base-r" value="50" step="1"></div>
                    <div class="form-group"><label>Height (Z) (mm)</label><input type="number" id="base-cyl-h" value="50" step="1"></div>
                    <div class="form-group">
                        <label>Rim Modifier</label>
                        <select id="base-cyl-mod">
                            <option value="none">None</option>
                            <option value="fillet">Fillet</option>
                            <option value="chamfer">Chamfer</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>Add Shape Elements</h3>
                <div class="btn-group">
                    <button class="btn-primary" id="btn-add-feat-box">+ Box</button>
                    <button class="btn-primary" id="btn-add-feat-cyl">+ Cylinder</button>
                    <button class="btn-primary" id="btn-add-feat-sphere">+ Sphere</button>
                </div>
            </div>

            <div class="panel-section hidden" id="panel-feature">
                <h3>Element Properties</h3>
                
                <div class="form-group">
                    <label>Action</label>
                    <select id="feat-type">
                        <option value="solid">Add (Solid)</option>
                        <option value="hole">Cut (Hole)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Shape</label>
                    <select id="feat-shape">
                        <option value="box">Box</option>
                        <option value="cylinder">Cylinder</option>
                        <option value="sphere">Sphere</option>
                    </select>
                </div>

                <div class="form-group" id="feat-axis-group">
                    <label>Orientation</label>
                    <select id="feat-axis">
                        <option value="z">Z-Axis (Vertical)</option>
                        <option value="x">X-Axis (Horizontal)</option>
                        <option value="y">Y-Axis (Depth)</option>
                    </select>
                </div>

                <div class="form-group"><label>Pos X (mm)</label><input type="number" id="feat-pos-x" step="1"></div>
                <div class="form-group"><label>Pos Y (mm)</label><input type="number" id="feat-pos-y" step="1"></div>
                <div class="form-group"><label>Pos Z (mm)</label><input type="number" id="feat-pos-z" step="1"></div>

                <div id="feat-dim-r" class="form-group"><label>Radius (mm)</label><input type="number" id="feat-radius" step="1" min="1"></div>
                <div id="feat-dim-w" class="form-group hidden"><label>Width (X) (mm)</label><input type="number" id="feat-w" step="1" min="1"></div>
                <div id="feat-dim-d" class="form-group hidden"><label>Depth (Y) (mm)</label><input type="number" id="feat-d" step="1" min="1"></div>
                <div id="feat-dim-h" class="form-group"><label>Height (Z) (mm)</label><input type="number" id="feat-height" step="1" min="1"></div>

                <div class="form-group hidden" id="feat-mod-val-group">
                    <label id="feat-mod-label">Mod Size (mm)</label>
                    <input type="number" id="feat-mod-val" step="1" min="0">
                </div>

                <div id="feat-box-edges" class="edge-grid hidden">
                    <div class="edge-grid-header">Vertical Edges</div>
                    <select id="f-vFL"><option value="none">FL: -</option><option value="fillet">FL: Fillet</option><option value="chamfer">FL: Chamfer</option></select>
                    <select id="f-vFR"><option value="none">FR: -</option><option value="fillet">FR: Fillet</option><option value="chamfer">FR: Chamfer</option></select>
                    <select id="f-vBL"><option value="none">BL: -</option><option value="fillet">BL: Fillet</option><option value="chamfer">BL: Chamfer</option></select>
                    <select id="f-vBR"><option value="none">BR: -</option><option value="fillet">BR: Fillet</option><option value="chamfer">BR: Chamfer</option></select>
                    <div class="edge-grid-header">Top Edges</div>
                    <select id="f-tF"><option value="none">F: -</option><option value="fillet">F: Fillet</option><option value="chamfer">F: Chamfer</option></select>
                    <select id="f-tB"><option value="none">B: -</option><option value="fillet">B: Fillet</option><option value="chamfer">B: Chamfer</option></select>
                    <select id="f-tL"><option value="none">L: -</option><option value="fillet">L: Fillet</option><option value="chamfer">L: Chamfer</option></select>
                    <select id="f-tR"><option value="none">R: -</option><option value="fillet">R: Fillet</option><option value="chamfer">R: Chamfer</option></select>
                    <div class="edge-grid-header">Bottom Edges</div>
                    <select id="f-bF"><option value="none">F: -</option><option value="fillet">F: Fillet</option><option value="chamfer">F: Chamfer</option></select>
                    <select id="f-bB"><option value="none">B: -</option><option value="fillet">B: Fillet</option><option value="chamfer">B: Chamfer</option></select>
                    <select id="f-bL"><option value="none">L: -</option><option value="fillet">L: Fillet</option><option value="chamfer">L: Chamfer</option></select>
                    <select id="f-bR"><option value="none">R: -</option><option value="fillet">R: Fillet</option><option value="chamfer">R: Chamfer</option></select>
                </div>

                <div id="feat-cyl-mods" class="hidden">
                    <div class="form-group">
                        <label id="cyl-mod-label">Modifier</label>
                        <select id="feat-mod">
                            <option value="none">None</option>
                            <option value="fillet">Fillet / C-Sink</option>
                            <option value="chamfer">Chamfer</option>
                        </select>
                    </div>
                </div>

                <button class="btn-danger" id="btn-delete-feat" style="width: 100%; margin-top: 10px;">Delete Element</button>
            </div>
        </div>

        <button id="mobile-toggle">⚙️ Edit Model</button>
        
        <div id="viewport">
            <div id="dim-tooltip" class="hidden">
                <div class="dim-row"><span class="dim-x">X Axis</span><span class="dim-val"><span id="lbl-x">0</span> mm</span></div>
                <div class="dim-row"><span class="dim-y">Y Axis</span><span class="dim-val"><span id="lbl-y">0</span> mm</span></div>
                <div class="dim-row"><span class="dim-z">Z Axis</span><span class="dim-val"><span id="lbl-z">0</span> mm</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import { CSG } from 'three-csg-ts';

        const EDGE_IDS = ['vFL','vFR','vBL','vBR','tF','tB','tL','tR','bF','bB','bL','bR'];

        let state = {
            base: { 
                shape: 'block', 
                x: 100, y: 100, z: 50, 
                radius: 50, height: 50, 
                edgeVal: 10,
                cylMod: 'none', 
                edges: {
                    vFL: 'fillet', vFR: 'chamfer', vBL: 'none', vBR: 'none',
                    tF: 'none', tB: 'none', tL: 'none', tR: 'none',
                    bF: 'none', bB: 'none', bL: 'none', bR: 'none'
                }
            },
            features: [],
            selectedId: 'base',
            wireframe: false,
            theme: 'dark'
        };

        const container = document.getElementById('viewport');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 5000);
        camera.up.set(0, 0, 1); 
        const initialCameraPos = new THREE.Vector3(150, -150, 150);
        camera.position.copy(initialCameraPos);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(100, 100, 200);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.left = -200;
        dirLight.shadow.camera.right = 200;
        dirLight.shadow.camera.top = 200;
        dirLight.shadow.camera.bottom = -200;
        dirLight.shadow.camera.far = 1000;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0xaaccff, 0.4);
        fillLight.position.set(-100, -100, -100);
        scene.add(fillLight);

        const gridHelper = new THREE.GridHelper(500, 50, 0x888888, 0x444444);
        gridHelper.rotation.x = Math.PI / 2; 
        scene.add(gridHelper);

        const axesHelper = new THREE.AxesHelper(100);
        scene.add(axesHelper);

        let materialSolid = new THREE.MeshStandardMaterial({
            color: 0x007aff, roughness: 0.3, metalness: 0.2,
            polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
        });
        const materialWireframe = new THREE.MeshBasicMaterial({ color: 0x000000, wireframe: true });

        let mainMesh = null;
        const ghostGroup = new THREE.Group();
        scene.add(ghostGroup);
        const dimLinesGroup = new THREE.Group();
        scene.add(dimLinesGroup);

        const transformControl = new TransformControls(camera, renderer.domElement);
        transformControl.size = 1.5;
        let isDraggingGizmo = false;
        
        transformControl.addEventListener('dragging-changed', (event) => {
            isDraggingGizmo = event.value;
            controls.enabled = !event.value;
            if (!event.value) { hideDimensions(); buildModel(); } 
            else { showDimensions(); }
        });

        transformControl.addEventListener('change', () => {
            if (transformControl.object && isDraggingGizmo) {
                const id = transformControl.object.userData.id;
                const feat = state.features.find(f => f.id === id);
                if (feat) {
                    feat.x = parseFloat(transformControl.object.position.x.toFixed(1));
                    feat.y = parseFloat(transformControl.object.position.y.toFixed(1));
                    feat.z = parseFloat(transformControl.object.position.z.toFixed(1));
                    updateUIInputsOnly(); 
                    updateDimensionsVisuals(transformControl.object.position);
                }
            }
        });
        scene.add(transformControl);

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', state.theme);
            const isDark = state.theme === 'dark';
            scene.background = new THREE.Color(isDark ? 0x121212 : 0xe5e5ea);
            materialWireframe.color.setHex(isDark ? 0xffffff : 0x000000);
            gridHelper.material.color.setHex(isDark ? 0x888888 : 0xaaaaaa);
            gridHelper.material.opacity = isDark ? 0.2 : 0.5;
            gridHelper.material.transparent = true;
        }

        function generateUniqueId() { return Math.random().toString(36).substring(2, 9); }

        function createModifiedCylinder(radius, height, mod, val) {
            val = Math.min(val, radius - 0.001, height / 2 - 0.001);
            if (mod === 'none' || val <= 0) {
                return new THREE.CylinderGeometry(radius, radius, height, 32); 
            }
            const pts = [];
            if (mod === 'chamfer') {
                pts.push(new THREE.Vector2(0, -height/2));
                pts.push(new THREE.Vector2(radius - val, -height/2));
                pts.push(new THREE.Vector2(radius, -height/2 + val));
                pts.push(new THREE.Vector2(radius, height/2 - val));
                pts.push(new THREE.Vector2(radius - val, height/2));
                pts.push(new THREE.Vector2(0, height/2));
            } else if (mod === 'fillet') {
                pts.push(new THREE.Vector2(0, -height/2));
                pts.push(new THREE.Vector2(radius - val, -height/2));
                for(let i=0; i<=90; i+=10) {
                    let radA = (i - 90) * Math.PI / 180;
                    pts.push(new THREE.Vector2(radius - val + val * Math.cos(radA), -height/2 + val + val * Math.sin(radA)));
                }
                pts.push(new THREE.Vector2(radius, height/2 - val));
                for(let i=0; i<=90; i+=10) {
                    let radA = i * Math.PI / 180;
                    pts.push(new THREE.Vector2(radius - val + val * Math.cos(radA), height/2 - val + val * Math.sin(radA)));
                }
                pts.push(new THREE.Vector2(radius - val, height/2));
                pts.push(new THREE.Vector2(0, height/2));
            }
            let geo = new THREE.LatheGeometry(pts, 32);
            if (mod === 'chamfer') { geo = geo.toNonIndexed(); geo.computeVertexNormals(); }
            return geo; 
        }

        function applyEdgeModifiersToCSG(csgObj, w, d, h, edges, val) {
            if (val <= 0) return csgObj;
            let result = csgObj;
            const cuts = [
                {id: 'vFL', ax: 'z', px: -w/2, py: -d/2, pz: 0, sX: 1, sY: 1, sZ: 0},
                {id: 'vFR', ax: 'z', px: w/2, py: -d/2, pz: 0, sX: -1, sY: 1, sZ: 0},
                {id: 'vBL', ax: 'z', px: -w/2, py: d/2, pz: 0, sX: 1, sY: -1, sZ: 0},
                {id: 'vBR', ax: 'z', px: w/2, py: d/2, pz: 0, sX: -1, sY: -1, sZ: 0},
                {id: 'tF', ax: 'x', px: 0, py: -d/2, pz: h/2, sX: 0, sY: 1, sZ: -1},
                {id: 'tB', ax: 'x', px: 0, py: d/2, pz: h/2, sX: 0, sY: -1, sZ: -1},
                {id: 'tL', ax: 'y', px: -w/2, py: 0, pz: h/2, sX: 1, sY: 0, sZ: -1},
                {id: 'tR', ax: 'y', px: w/2, py: 0, pz: h/2, sX: -1, sY: 0, sZ: -1},
                {id: 'bF', ax: 'x', px: 0, py: -d/2, pz: -h/2, sX: 0, sY: 1, sZ: 1},
                {id: 'bB', ax: 'x', px: 0, py: d/2, pz: -h/2, sX: 0, sY: -1, sZ: 1},
                {id: 'bL', ax: 'y', px: -w/2, py: 0, pz: -h/2, sX: 1, sY: 0, sZ: 1},
                {id: 'bR', ax: 'y', px: w/2, py: 0, pz: -h/2, sX: -1, sY: 0, sZ: 1}
            ];

            cuts.forEach(e => {
                const mod = edges[e.id];
                if (!mod || mod === 'none') return;
                
                let cutterCSG;
                let length = (e.ax === 'x' ? w : (e.ax === 'y' ? d : h)) + val * 4;

                if (mod === 'chamfer') {
                    let cGeo = new THREE.BoxGeometry(
                        e.ax === 'x' ? length : val * Math.SQRT2,
                        e.ax === 'y' ? length : val * Math.SQRT2,
                        e.ax === 'z' ? length : val * Math.SQRT2
                    );
                    let cMesh = new THREE.Mesh(cGeo);
                    if (e.ax === 'x') cMesh.rotation.x = Math.PI / 4;
                    if (e.ax === 'y') cMesh.rotation.y = Math.PI / 4;
                    if (e.ax === 'z') cMesh.rotation.z = Math.PI / 4;
                    cMesh.position.set(e.px, e.py, e.pz);
                    cMesh.updateMatrixWorld();
                    cutterCSG = CSG.fromMesh(cMesh);
                } else if (mod === 'fillet') {
                    let bGeo = new THREE.BoxGeometry(
                        e.ax === 'x' ? length : val * 2,
                        e.ax === 'y' ? length : val * 2,
                        e.ax === 'z' ? length : val * 2
                    );
                    let bMesh = new THREE.Mesh(bGeo);
                    bMesh.position.set(e.px, e.py, e.pz);
                    bMesh.updateMatrixWorld();
                    let boxCSG = CSG.fromMesh(bMesh);

                    let cylGeo = new THREE.CylinderGeometry(val, val, length, 32);
                    let cylMesh = new THREE.Mesh(cylGeo);
                    if (e.ax === 'x') {
                        cylMesh.rotation.z = Math.PI / 2;
                        cylMesh.position.set(e.px, e.py + e.sY*val, e.pz + e.sZ*val);
                    } else if (e.ax === 'y') {
                        cylMesh.position.set(e.px + e.sX*val, e.py, e.pz + e.sZ*val);
                    } else if (e.ax === 'z') {
                        cylMesh.rotation.x = Math.PI / 2;
                        cylMesh.position.set(e.px + e.sX*val, e.py + e.sY*val, e.pz);
                    }
                    cylMesh.updateMatrixWorld();
                    let cylCSG = CSG.fromMesh(cylMesh);
                    cutterCSG = boxCSG.subtract(cylCSG);
                }
                if(cutterCSG) result = result.subtract(cutterCSG);
            });
            return result;
        }

        function buildModel() {
            if (mainMesh) { scene.remove(mainMesh); mainMesh.geometry.dispose(); }
            
            transformControl.detach(); 
            while(ghostGroup.children.length > 0){
                let child = ghostGroup.children[0];
                ghostGroup.remove(child);
                child.geometry.dispose();
                child.material.dispose();
            }

            const b = state.base;
            gridHelper.position.z = b.shape === 'block' ? -b.z / 2 : -b.height / 2;
            gridHelper.position.y = 0;

            try {
                let resultCSG;

                // 1. BASE GEOMETRY
                if (b.shape === 'block') {
                    let baseMesh = new THREE.Mesh(new THREE.BoxGeometry(b.x, b.y, b.z));
                    baseMesh.updateMatrixWorld();
                    resultCSG = CSG.fromMesh(baseMesh);
                    
                    let limit = Math.min(b.x, b.y, b.z) / 2.01;
                    resultCSG = applyEdgeModifiersToCSG(resultCSG, b.x, b.y, b.z, b.edges, Math.min(b.edgeVal, limit));
                } else {
                    let cylGeo = createModifiedCylinder(b.radius, b.height, b.cylMod, b.edgeVal);
                    cylGeo.rotateX(Math.PI / 2);
                    let cylMesh = new THREE.Mesh(cylGeo);
                    cylMesh.updateMatrixWorld();
                    resultCSG = CSG.fromMesh(cylMesh);
                }

                // 2. ADD CUSTOM FEATURES
                state.features.forEach(feat => {
                    let featCSG;
                    let ghostGeo;
                    
                    if (feat.shape === 'box') {
                        let baseFeatMesh = new THREE.Mesh(new THREE.BoxGeometry(feat.w, feat.d, feat.h));
                        baseFeatMesh.updateMatrixWorld();
                        let tempCSG = CSG.fromMesh(baseFeatMesh);
                        let limit = Math.min(feat.w, feat.d, feat.h) / 2.01;
                        tempCSG = applyEdgeModifiersToCSG(tempCSG, feat.w, feat.d, feat.h, feat.edges, Math.min(feat.modVal, limit));
                        
                        let tempMesh = CSG.toMesh(tempCSG, new THREE.Matrix4(), materialSolid);
                        tempMesh.position.set(feat.x, feat.y, feat.z);
                        tempMesh.updateMatrixWorld();
                        featCSG = CSG.fromMesh(tempMesh);
                        
                        // Exact ghost geometry
                        ghostGeo = tempMesh.geometry.clone();
                    } else if (feat.shape === 'sphere') {
                        ghostGeo = new THREE.SphereGeometry(feat.r, 32, 16);
                        let sphMesh = new THREE.Mesh(ghostGeo);
                        sphMesh.position.set(feat.x, feat.y, feat.z);
                        sphMesh.updateMatrixWorld();
                        featCSG = CSG.fromMesh(sphMesh);
                    } else { // Cylinder
                        let cylGeo;
                        if (feat.type === 'solid') {
                            cylGeo = createModifiedCylinder(feat.r, feat.h, feat.mod, feat.modVal);
                        } else {
                            cylGeo = new THREE.CylinderGeometry(feat.r, feat.r, feat.h, 32);
                        }
                        ghostGeo = cylGeo.clone();
                        
                        let cylMesh = new THREE.Mesh(cylGeo);
                        if (feat.axis === 'z') cylMesh.rotation.x = Math.PI / 2; 
                        else if (feat.axis === 'x') cylMesh.rotation.z = -Math.PI / 2; 
                        cylMesh.position.set(feat.x, feat.y, feat.z);
                        cylMesh.updateMatrixWorld();
                        featCSG = CSG.fromMesh(cylMesh);

                        // Hole top modifier
                        if (feat.type === 'hole' && feat.mod !== 'none' && feat.modVal > 0) {
                            let coneGeo = new THREE.CylinderGeometry(feat.r + feat.modVal, feat.r, feat.modVal, 32);
                            let topCone = new THREE.Mesh(coneGeo);
                            let dir = new THREE.Vector3(0, 1, 0).applyEuler(cylMesh.rotation);
                            topCone.position.copy(cylMesh.position).add(dir.clone().multiplyScalar(feat.h / 2));
                            topCone.rotation.copy(cylMesh.rotation);
                            topCone.updateMatrixWorld();
                            featCSG = featCSG.union(CSG.fromMesh(topCone));
                        }
                    }

                    let isSelected = state.selectedId === feat.id;
                    let ghostMat = new THREE.MeshBasicMaterial({
                        color: isSelected ? 0xffcc00 : (feat.type === 'hole' ? 0xff4444 : 0x44ff44),
                        transparent: true, opacity: isSelected ? 0.7 : 0.2, wireframe: !isSelected, depthWrite: false
                    });
                    
                    let ghostMesh = new THREE.Mesh(ghostGeo, ghostMat);
                    
                    // Only rotate Cylinder ghost mesh (Boxes are naturally aligned)
                    if (feat.shape === 'cylinder') {
                        if (feat.axis === 'z') ghostMesh.rotation.x = Math.PI / 2; 
                        else if (feat.axis === 'x') ghostMesh.rotation.z = -Math.PI / 2; 
                    }
                    
                    ghostMesh.position.set(feat.x, feat.y, feat.z);
                    ghostMesh.userData.id = feat.id;
                    ghostGroup.add(ghostMesh);

                    if (isSelected) transformControl.attach(ghostMesh);

                    if (feat.type === 'hole') {
                        resultCSG = resultCSG.subtract(featCSG);
                    } else {
                        resultCSG = resultCSG.union(featCSG);
                    }
                });

                mainMesh = CSG.toMesh(resultCSG, new THREE.Matrix4(), materialSolid);
                mainMesh.castShadow = true; mainMesh.receiveShadow = true;
                
                if (state.wireframe) {
                    const edges = new THREE.EdgesGeometry(mainMesh.geometry);
                    const line = new THREE.LineSegments(edges, materialWireframe);
                    mainMesh.add(line);
                }

                mainMesh.userData.id = 'base';
                scene.add(mainMesh);

                if(state.selectedId === 'base') {
                    materialSolid.emissive.setHex(0x222222);
                    transformControl.detach();
                } else {
                    materialSolid.emissive.setHex(0x000000);
                }

            } catch (err) { console.error("Build Error:", err); }
        }

        const raycaster = new THREE.Raycaster();
        const pointerDownPos = new THREE.Vector2();
        
        container.addEventListener('pointerdown', (event) => {
            if(isDraggingGizmo) return; 
            pointerDownPos.set(event.clientX, event.clientY);
        });

        container.addEventListener('pointerup', (event) => {
            if(isDraggingGizmo) return;
            const dx = event.clientX - pointerDownPos.x;
            const dy = event.clientY - pointerDownPos.y;
            if (Math.sqrt(dx*dx + dy*dy) > 5) return; 

            if(event.target !== renderer.domElement) return;

            const rect = container.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((event.clientX - rect.left) / rect.width) * 2 - 1,
                -((event.clientY - rect.top) / rect.height) * 2 + 1
            );

            raycaster.setFromCamera(mouse, camera);

            let isGizmo = false;
            raycaster.intersectObjects(scene.children, true).forEach(hit => {
                if(hit.object.parent && hit.object.parent.type === "TransformControls") isGizmo = true;
            });
            if (isGizmo) return;

            let intersects = raycaster.intersectObjects(ghostGroup.children, false);
            if (intersects.length > 0) {
                state.selectedId = intersects[0].object.userData.id;
            } else {
                if (mainMesh) {
                    let baseIntersect = raycaster.intersectObject(mainMesh, false);
                    state.selectedId = baseIntersect.length > 0 ? 'base' : null;
                }
            }
            updateUI(); buildModel();
        });

        function showDimensions() { document.getElementById('dim-tooltip').classList.remove('hidden'); }

        function updateDimensionsVisuals(pos) {
            dimLinesGroup.clear();
            const matX = new THREE.LineDashedMaterial({ color: 0xff6666, dashSize: 5, gapSize: 3, depthTest: false, transparent: true, opacity: 0.8 });
            const matY = new THREE.LineDashedMaterial({ color: 0x66ff66, dashSize: 5, gapSize: 3, depthTest: false, transparent: true, opacity: 0.8 });
            const matZ = new THREE.LineDashedMaterial({ color: 0x6666ff, dashSize: 5, gapSize: 3, depthTest: false, transparent: true, opacity: 0.8 });

            const geoX = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(pos.x,0,0)]);
            const geoY = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(pos.x,0,0), new THREE.Vector3(pos.x,pos.y,0)]);
            const geoZ = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(pos.x,pos.y,0), pos]);

            const lineX = new THREE.Line(geoX, matX); lineX.computeLineDistances();
            const lineY = new THREE.Line(geoY, matY); lineY.computeLineDistances();
            const lineZ = new THREE.Line(geoZ, matZ); lineZ.computeLineDistances();
            
            lineX.renderOrder = 999; lineY.renderOrder = 999; lineZ.renderOrder = 999;
            dimLinesGroup.add(lineX, lineY, lineZ);

            document.getElementById('lbl-x').textContent = pos.x.toFixed(1);
            document.getElementById('lbl-y').textContent = pos.y.toFixed(1);
            document.getElementById('lbl-z').textContent = pos.z.toFixed(1);

            const tooltip = document.getElementById('dim-tooltip');
            const proj = pos.clone().project(camera);
            const w = container.clientWidth; const h = container.clientHeight;
            tooltip.style.left = `${(proj.x * 0.5 + 0.5) * w}px`;
            tooltip.style.top = `${(-proj.y * 0.5 + 0.5) * h}px`;
        }

                    document.getElementById('feat-height').value = feat.h;
                    document.getElementById('feat-w').value = feat.w;
                    document.getElementById('feat-d').value = feat.d;
                    document.getElementById('feat-mod-val').value = feat.modVal;

                    const dimR = document.getElementById('feat-dim-r');
                    const dimH = document.getElementById('feat-dim-h');
                    const dimW = document.getElementById('feat-dim-w');
                    const dimD = document.getElementById('feat-dim-d');
                    
                    const modGroup = document.getElementById('feat-mod-val-group');
                    const boxEdges = document.getElementById('feat-box-edges');
                    const cylMods = document.getElementById('feat-cyl-mods');
                    const axisGroup = document.getElementById('feat-axis-group');

                    if (feat.shape === 'box') {
                        dimR.classList.add('hidden');
                        dimH.querySelector('label').innerText = 'Height (Z) (mm)';
                        dimH.classList.remove('hidden'); dimW.classList.remove('hidden'); dimD.classList.remove('hidden');
                        
                        axisGroup.classList.add('hidden'); // Do not rotate boxes
                        modGroup.classList.remove('hidden');
                        document.getElementById('feat-mod-label').innerText = 'Edge Size (mm)';
                        boxEdges.classList.remove('hidden');
                        cylMods.classList.add('hidden');
                        
                        EDGE_IDS.forEach(e => { document.getElementById(`f-${e}`).value = feat.edges[e]; });
                        
                    } else if (feat.shape === 'sphere') {
                        dimR.classList.remove('hidden');
                        dimH.classList.add('hidden'); dimW.classList.add('hidden'); dimD.classList.add('hidden');
                        axisGroup.classList.add('hidden'); 
                        modGroup.classList.add('hidden'); boxEdges.classList.add('hidden'); cylMods.classList.add('hidden');
                    } else { // cylinder
                        dimR.classList.remove('hidden');
                        dimH.querySelector('label').innerText = 'Height (Z) (mm)';
                        dimH.classList.remove('hidden'); dimW.classList.add('hidden'); dimD.classList.add('hidden');
                        
                        axisGroup.classList.remove('hidden'); // Cylinders need rotation
                        boxEdges.classList.add('hidden');
                        cylMods.classList.remove('hidden');
                        
                        document.getElementById('feat-mod').value = feat.mod;
                        if (feat.mod !== 'none') {
                            modGroup.classList.remove('hidden');
                            document.getElementById('feat-mod-label').innerText = feat.type === 'hole' ? 'Cut Depth (mm)' : 'Edge Size (mm)';
                        } else {
                            modGroup.classList.add('hidden');
                        }
                    }
                } else { panelFeat.classList.add('hidden'); }
            } else { panelFeat.classList.add('hidden'); }
        }

                id, type, shape, axis: 'z', 
                x: 0, y: 0, z: type === 'solid' ? startZ + 25 : 0, 
                r: 20, h: 50, w: 50, d: 50, 
                mod: 'none', modVal: 5,
                edges: { vFL:'none',vFR:'none',vBL:'none',vBR:'none',tF:'none',tB:'none',tL:'none',tR:'none',bF:'none',bB:'none',bL:'none',bR:'none' }
            });

                uiPanel.classList.remove('open');
                mobileOverlay.classList.remove('active');
                btnCloseMobile.style.display = 'none';
            }
        }

        mobileToggle.addEventListener('click', () => toggleMobileUI(true));
        mobileOverlay.addEventListener('click', () => toggleMobileUI(false));
        btnCloseMobile.addEventListener('click', () => toggleMobileUI(false));

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            if(window.innerWidth > 768) {
                uiPanel.classList.remove('open');
                mobileOverlay.classList.remove('active');
                btnCloseMobile.style.display = 'none';
            }
            if(isDraggingGizmo && transformControl.object) updateDimensionsVisuals(transformControl.object.position);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        applyTheme(); updateUI(); buildModel(); animate();
    </script>
</body>
</html>
