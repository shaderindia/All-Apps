<title>WebCAM Pro</title>
<style>
:root{--bg:#16181d;--panel:#1e2128;--line:#2c313a;--txt:#d7dbe2;--mut:#8b93a1;--acc:#4f8cff;--red:#ff5252;--grn:#3ddc84}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
body{font:13px/1.4 system-ui,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
#app{display:flex;height:100vh;position:relative}
aside{background:var(--panel);overflow-y:auto}
#panel{width:285px;border-right:1px solid var(--line);padding:10px}
#gpanel{width:320px;border-left:1px solid var(--line);padding:10px;display:flex;flex-direction:column;gap:8px}
#viewport{flex:1;position:relative}
#viewport canvas{display:block;touch-action:none}
h1{font-size:15px;margin:2px 0 8px;color:var(--acc)}
fieldset{border:1px solid var(--line);border-radius:6px;padding:7px;margin-bottom:9px}
legend{padding:0 6px;color:var(--mut);font-size:11px;text-transform:uppercase;cursor:pointer;user-select:none}
fieldset.fold>*:not(legend){display:none}
label{display:flex;justify-content:space-between;align-items:center;margin:3px 0;gap:6px}
label span{color:var(--mut)}
input,select{background:#12141a;border:1px solid var(--line);color:var(--txt);border-radius:4px;padding:3px 6px;width:90px;font:inherit}
select.list{width:100%;height:auto}
input[type=checkbox]{width:auto}
button{background:#2a3140;border:1px solid var(--line);color:var(--txt);border-radius:5px;padding:5px 7px;cursor:pointer;font:inherit;width:100%;margin-top:4px}
button:hover{border-color:var(--acc)}
button.primary{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
button.on{background:#5a2330;border-color:var(--red)}
.row{display:flex;gap:5px}.row button{margin-top:4px}
.chk{display:grid;grid-template-columns:1fr 1fr;gap:0 8px;margin:4px 0}
.chk label{justify-content:flex-start;gap:5px;font-size:12px}
#gcode{flex:1;width:100%;background:#101216;color:#b9e08f;border:1px solid var(--line);border-radius:6px;font:11px/1.5 ui-monospace,monospace;padding:8px;resize:none;white-space:pre}
#stats,#simInfo,#faceInfo,#sideInfo{font-size:11px;color:var(--mut)}
#simInfo.warn{color:var(--red);font-weight:600}
#faceInfo.ok,#sideInfo.ok{color:var(--grn)}
.hide{display:none}
#mobBtns{display:none;position:absolute;top:10px;left:10px;gap:6px;z-index:5}
#mobBtns button{width:auto;padding:8px 12px;background:#1e2128ee;border:1px solid var(--line);border-radius:8px}
@media (max-width:900px){
#panel,#gpanel{position:absolute;top:0;bottom:0;z-index:6;width:min(86vw,330px);transition:transform .25s ease;box-shadow:0 0 24px #000a}
#panel{left:0;transform:translateX(-105%)}#gpanel{right:0;transform:translateX(105%)}
#panel.open,#gpanel.open{transform:translateX(0)}
#mobBtns{display:flex}button{padding:9px 10px}input,select{font-size:16px;padding:6px 8px}}
@media (pointer:coarse){button{padding:10px}input,select{font-size:16px}}

if(drill){const hh=d*0.6,cg=new THREE.ConeGeometry(d/2,hh,24);

bg.rotateZ(a);bg.translate(0,0,base+fl/2);

const sg=new THREE.CylinderGeometry(d/2,d/2,16,24);sg.rotateX(Math.PI/2);sg.translate(0,0,base+fl+8);

function stamp(x,y,z){
const{nx,ny,cell}=HM,r=genParams.td/2,cr=Math.ceil(r/cell);

const{nx,ny,cell}=HM;
const ix=Math.min(nx-1,Math.max(0,Math.round(px/cell))),iy=Math.min(ny-1,Math.max(0,Math.round(py/cell)));
return sim.hm[iy*nx+ix]>z+0.02;});}
function simTick(dt){
if(!sim||!sim.playing)return;
let rem=dt*(+$('simSpeed').value);
const{cell}=HM;
while(rem>1e-9&&sim.idx<simPath.length-1){
const b=simPath[sim.idx+1],a=sim.cur;
const dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z,len=Math.hypot(dx,dy,dz);
if(len<1e-9){sim.idx++;continue;}
const mmps=b.f/60,can=Math.min(len,mmps*rem);
const steps=Math.max(1,Math.ceil(can/(cell*0.7)));
for(let s=1;s<=steps;s++){const t=(can/len)*(s/steps);
const px=a.x+dx*t,py=a.y+dy*t,pz=a.z+dz*t;
if(!b.rapid)stamp(px,py,pz);
else if(!sim.collided&&dz<=0&&rapidHit(px,py,pz)){sim.collided=true;
$('simInfo').textContent='⚠ RAPID COLLISION with material! Check Safe Z.';
$('simInfo').classList.add('warn');}}
sim.cur={x:a.x+dx*(can/len),y:a.y+dy*(can/len),z:a.z+dz*(can/len)};
sim.machT+=can/mmps;rem-=can/mmps;
if(can>=len-1e-9){sim.idx++;sim.cur={x:b.x,y:b.y,z:b.z};}}
sim.tool.position.set(sim.cur.x,sim.cur.y,sim.cur.z);
sim.tool.userData.spin.rotation.z-=Math.min(genParams.rpm,900)/60*2*Math.PI*dt;
sim.normT+=dt;
if(sim.normT>0.12){sim.mesh.geometry.computeVertexNormals();sim.normT=0;}
if(sim.idx>=simPath.length-1){sim.playing=false;sim.mesh.geometry.computeVertexNormals();
if(!sim.collided){let over=0,left=0;const d=HM.h;
for(let i=0;i<d.length;i++){const df=sim.hm[i]-d[i];
if(df<-0.005)over=Math.max(over,-df);else if(df>0.005)left=Math.max(left,df);}
$('simInfo').textContent=`✓ Complete · ${Math.floor(sim.total/60)}m ${Math.round(sim.total%60)}s · overcut ${over.toFixed(2)} · stock left ${left.toFixed(2)}`;}}
else if(!sim.collided)$('simInfo').textContent=
`Machining… ${Math.min(100,(sim.machT/sim.total*100)).toFixed(1)}%`;}

vp.appendChild(homeBtn);

const d=Math.max(L,W)*1.6+60;
camera.position.set(d*0.8,-d*0.8,d*0.7);controls.update();}
