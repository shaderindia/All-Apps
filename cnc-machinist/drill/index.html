<div class="main-wrapper">
    <header class="app-header">
        <div class="header-nav">

            <h1>SHADER<span>7</span></h1>
            <p>Advanced CNC Tools & Resources</p>
        </div>
    </header>

    <h2>Feed & Speed Calculator</h2>

    <div class="app-container">
        <div class="panel">
            <div class="form-group">
                <label for="operation">Operation</label>
                <select id="operation">
                    <option value="drill">Drilling</option>
                    <option value="tap">Tapping (Rigid)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="diameter">Tool Diameter (mm)</label>
                <input type="number" id="diameter" step="0.1" placeholder="e.g. 6">
            </div>

            <div class="form-group hidden" id="pitchGroup">
                <label for="pitch">Thread Pitch (mm) <span style="font-weight:normal; font-size:0.8rem;">(Overrides Coarse)</span></label>
                <input type="number" id="pitch" step="0.05" placeholder="e.g. 1.0">
            </div>

            <div class="form-group">
                <label for="toolMaterial">Tool Material</label>
                <select id="toolMaterial">
                    <option value="hss">HSS</option>
                    <option value="hssco">HSS-Co</option>
                    <option value="carbide">Carbide</option>
                </select>
            </div>

            <div class="form-group">
                <label for="workMaterial">Work Material</label>
                <select id="workMaterial">
                    <option value="mild">Mild Steel</option>
                    <option value="alloy">Alloy Steel</option>
                    <option value="stainless">Stainless Steel</option>
                    <option value="aluminum">Aluminum</option>
                </select>
            </div>

            <div class="form-group">
                <label for="depth">Hole Depth (mm) <span style="font-weight:normal; font-size:0.8rem;">(Optional)</span></label>
                <input type="number" id="depth" placeholder="e.g. 20">
            </div>

            <button class="calc-btn" onclick="calculate()">Calculate Parameters</button>
        </div>

        <div class="panel">
            <div id="result">
                <div class="empty-state">Enter tool parameters and click calculate to see results.</div>
            </div>
        </div>
    </div>
</div>

<script>
// Elements
const opEl = document.getElementById("operation");
const diaEl = document.getElementById("diameter");
const pitchEl = document.getElementById("pitch");
const pitchGroup = document.getElementById("pitchGroup");
const resultEl = document.getElementById("result");

// ISO metric coarse pitch table
const pitchTable = [
 {d:3,p:0.5},{d:4,p:0.7},{d:5,p:0.8},{d:6,p:1.0},
 {d:8,p:1.25},{d:10,p:1.5},{d:12,p:1.75},
 {d:16,p:2.0},{d:20,p:2.5},{d:24,p:3.0},
 {d:30,p:3.5},{d:36,p:4.0},{d:42,p:4.5}
];

function getPitch(d){
    return pitchTable.reduce((a,b)=>
        Math.abs(b.d-d)<Math.abs(a.d-d)?b:a
    ).p;
}

// Clear results when user changes inputs to prevent stale data
document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', () => {
        resultEl.innerHTML = '<div class="empty-state">Enter tool parameters and click calculate to see results.</div>';
    });
});

// Show/Hide Pitch Input based on Operation & Auto-fill coarse pitch
function handleOperationChange() {
    if (opEl.value === "tap") {
        pitchGroup.classList.remove("hidden");
        const D = parseFloat(diaEl.value);
        if (D > 0 && !pitchEl.value) {
            pitchEl.value = getPitch(D);
        }
    } else {
        pitchGroup.classList.add("hidden");
    }
}

opEl.addEventListener('change', handleOperationChange);

// Auto-suggest pitch when diameter is typed (only if tapping)
diaEl.addEventListener('input', () => {
    if (opEl.value === "tap") {
        const D = parseFloat(diaEl.value);
        if (D > 0) {
            pitchEl.value = getPitch(D);
        } else {
            pitchEl.value = "";
        }
    }
});

// Correct industrial drill feed per rev
function drillFeedPerRev(d){
    if (d <= 5) return 0.07;
    if (d <= 8) return 0.10;
    if (d <= 12) return 0.14;
    if (d <= 20) return 0.18;
    return 0.25;
}

// SMART TAPPING SYNC: Adjusts RPM slightly to force a perfect whole-number Feed
function getSyncedTap(baseRpm, pitch) {
    // Search up to +/- 10 RPM to find a number that multiplies perfectly into an integer
    for (let i = 0; i <= 20; i++) {
        let offset = i % 2 === 0 ? i / 2 : -(i + 1) / 2;
        let testRpm = Math.round(baseRpm) + offset;
        let testFeed = testRpm * pitch;
        
        // If the resulting feed is a whole number (accounting for tiny JS float math errors)
        if (Math.abs(testFeed - Math.round(testFeed)) < 0.001) {
            return { r: testRpm, f: Math.round(testFeed) };
        }
    }
    // Fallback if no integer is found: Just round the RPM and Feed normally
    return { r: Math.round(baseRpm), f: Math.round(baseRpm * pitch) };
}

function calculate(){
    const op = opEl.value;
    const D = parseFloat(diaEl.value);
    const tool = document.getElementById("toolMaterial").value;
    const mat = document.getElementById("workMaterial").value;
    const depth = parseFloat(document.getElementById("depth").value) || 0;

    // Reject Zero, Negative, or Empty numbers
    if(!D || D <= 0){ 
        alert("Please enter a valid positive tool diameter."); 
        diaEl.focus();
        return; 
    }

    // Cutting speeds (m/min)
    const drillV = {
        mild:{hss:22,hssco:28,carbide:80},
        alloy:{hss:18,hssco:24,carbide:70},
        stainless:{hss:14,hssco:20,carbide:60},
        aluminum:{hss:60,hssco:80,carbide:200}
    };

    const tapV = {
        mild:{hss:6,hssco:8,carbide:18},
        alloy:{hss:5,hssco:7,carbide:15},
        stainless:{hss:4,hssco:6,carbide:12},
        aluminum:{hss:10,hssco:12,carbide:30}
    };

    const V = (op==="drill") ? drillV[mat][tool] : tapV[mat][tool];

    // Initial mathematically standard RPMs
    const rpmStdRaw = (1000 * V) / (Math.PI * D);
    const rpmMinRaw = rpmStdRaw * 0.6;
    const rpmMaxRaw = rpmStdRaw * 1.2;

    let html = "";

    if(op === "drill"){
        const f_rev = drillFeedPerRev(D);
        
        // Ensure Drill values are rounded integers
        const rpmMin = Math.round(rpmMinRaw);
        const rpmStd = Math.round(rpmStdRaw);
        const rpmMax = Math.round(rpmMaxRaw);
        
        let peckWarning = "";
        if (depth >= (D * 3)) {
            peckWarning = `<div class="warn-box">⚠️ Depth is &ge; 3x Diameter. Use peck drilling (G83/G73).</div>`;
        }

        html = `
        <h3 class="results-header">Drilling Results</h3>
        
        <div class="result-card min">
            <div class="result-card-info">
                <h4>Minimum</h4>
                <p>${rpmMin} RPM</p>
            </div>
            <div class="result-card-extra">
                F ${Math.round(rpmMin*f_rev)} mm/min
            </div>
        </div>

        <div class="result-card std">
            <div class="result-card-info">
                <h4>Standard (Recommended)</h4>
                <p>${rpmStd} RPM</p>
            </div>
            <div class="result-card-extra">
                F ${Math.round(rpmStd*f_rev)} mm/min
            </div>
        </div>

        <div class="result-card max">
            <div class="result-card-info">
                <h4>Max Safe</h4>
                <p>${rpmMax} RPM</p>
            </div>
            <div class="result-card-extra">
                F ${Math.round(rpmMax*f_rev)} mm/min
            </div>
        </div>

        <div style="margin-top: 15px; font-size: 0.9rem; color: var(--text-muted);">
            <strong>Calculated Feed/Rev:</strong> ${f_rev} mm/rev
        </div>
        ${peckWarning}
        `;
    } else {
        // Handle custom pitch or fallback
        let pitch = parseFloat(pitchEl.value);
        if (!pitch || pitch <= 0) {
            pitch = getPitch(D);
            pitchEl.value = pitch; 
        }

        // Apply Smart Sync to find perfect whole numbers for Rigid Tapping
        const minTap = getSyncedTap(rpmMinRaw, pitch);
        const stdTap = getSyncedTap(rpmStdRaw, pitch);
        const maxTap = getSyncedTap(rpmMaxRaw, pitch);

        html = `
        <h3 class="results-header">Tapping Results (M${D} x ${pitch})</h3>
        
        <div class="result-card min">
            <div class="result-card-info">
                <h4>Minimum</h4>
                <p>${minTap.r} RPM</p>
            </div>
            <div class="result-card-extra">
                F ${minTap.f} mm/min
            </div>
        </div>

        <div class="result-card std">
            <div class="result-card-info">
                <h4>Standard (Recommended)</h4>
                <p>${stdTap.r} RPM</p>
            </div>
            <div class="result-card-extra">
                F ${stdTap.f} mm/min
            </div>
        </div>

        <div class="result-card max">
            <div class="result-card-info">
                <h4>Max Safe</h4>
                <p>${maxTap.r} RPM</p>
            </div>
            <div class="result-card-extra">
                F ${maxTap.f} mm/min
            </div>
        </div>

        <div class="warn-box">
            ⚠️ Values are perfectly synced for Rigid Tapping (G84). Feed = RPM &times; Pitch.
        </div>
        `;
    }

    resultEl.innerHTML = html;
}
</script>

</body>
